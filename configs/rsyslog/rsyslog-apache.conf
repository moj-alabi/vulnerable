# ============================================================
#  rsyslog config – forward Apache logs to Wazuh syslog
#  Mounted into: /etc/rsyslog.d/apache.conf
#  Works inside pre-built images (WordPress, DVWA, Mutillidae,
#  phpMyAdmin) that cannot have Wazuh agent installed.
# ============================================================

# Load imfile module to tail log files
module(load="imfile" PollingInterval="2")

# ── Apache access log ─────────────────────────────────────
input(type="imfile"
      File="/var/log/apache2/access.log"
      Tag="apache-access"
      Severity="info"
      Facility="local6")

# ── Apache error log ──────────────────────────────────────
input(type="imfile"
      File="/var/log/apache2/error.log"
      Tag="apache-error"
      Severity="warning"
      Facility="local6")

# ── Auth log (login attempts) ─────────────────────────────
input(type="imfile"
      File="/var/log/auth.log"
      Tag="auth"
      Severity="info"
      Facility="auth")

# ── Forward everything to Wazuh manager via TCP syslog ────
# WAZUH_MANAGER_IP is substituted by the setup script
*.* @@WAZUH_MANAGER_IP:514;RSYSLOG_SyslogProtocol23Format
