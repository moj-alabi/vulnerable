proxy:
  listen_host: "0.0.0.0"
  listen_port: 8888
  upstream: "http://127.0.0.1:80"
  upstream_timeout_secs: 30
  body_limit_bytes: 1048576

waf:
  mode: "block"          # block | detect

  allowed_ips:
    - "127.0.0.1"

  blocked_ips: []
  blocked_paths: []

  rate_limit:
    window_seconds: 60
    max_requests: 200
    sensitive_max: 20
    ban_duration_secs: 300

  blocked_ja3: []
  blocked_ja4_prefixes: []

  # IP reputation auto-ban
  reputation_threshold: 150   # cumulative score before ban
  reputation_ban_secs: 3600   # 1 hour

  # JS proof-of-work challenge (browser verification)
  challenge_enabled: false
  challenge_categories:
    - "scanner"
    - "ratelimit"

  # Minimum threat score to act (0 = act on any hit)
  score_threshold: 30

  # Block TRACE/TRACK/CONNECT always; also enforce strict method allowlist
  enforce_http_methods: false

  # Inspect response bodies for data leakage (stack traces, SQL errors, keys)
  dlp_enabled: false

  # CRS-equivalent paranoia level (1-4).
  #   1 = production safe, low false positives (default)
  #   2 = broader SQL/XSS structural patterns
  #   3 = protocol anomaly checks
  #   4 = SSTI detection (high FP risk, use in lab/research)
  paranoia_level: 2

  # Per-IP session score accumulation (catches slow/distributed attacks)
  session:
    window_secs: 300          # sliding window in seconds
    warn_threshold: 20        # log only
    challenge_threshold: 60   # serve JS PoW challenge
    block_threshold: 120      # block + reputation-ban
    max_requests: 500         # max requests per window before flood-block

  # Virtual patching – custom rules (evaluated before generic engine)
  # virtual_patches:
  #   - name: "Block PHP eval in admin upload"
  #     path_prefix: "/admin/upload"
  #     method: "POST"
  #     body_regex: '\beval\s*\('
  #     action: "block"
  #     score: 100
  #
  #   - name: "Allowlist known scanner IP"
  #     path_prefix: "/"
  #     param_name: "debug"
  #     param_regex: "true"
  #     action: "log"
  #     score: 5
  virtual_patches: []

# Admin dashboard (served on a separate port, never exposed publicly)
admin:
  enabled: true
  listen_host: "127.0.0.1"
  listen_port: 9000

notifications:
  discord_webhook: null
  # discord_webhook: "https://discord.com/api/webhooks/XXX/YYY"
  discord_min_action: "BLOCK"

  webhook_url: null
  webhook_headers: {}
  webhook_min_action: "BLOCK"

  syslog:
    enabled: false
    host: "10.0.0.1"
    port: 514
    proto: "udp"
    min_action: "BLOCK"

logging:
  path: "/var/log/dome/waf.log"
  max_bytes: 10485760
  backup_count: 5
