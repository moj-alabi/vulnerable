<!-- ==============================================================
     CTF Lab – Wazuh Manager remote-input snippet
     Drop these <remote> blocks into /var/ossec/etc/ossec.conf
     on the Wazuh VM at 10.0.10.2, inside the <ossec_config> root.

     The push-rules.sh script will print the exact scp command
     needed if it cannot deploy this automatically.
     ============================================================== -->

  <!-- ── Syslog receiver: TCP (rsyslog from CTF containers) ── -->
  <!--
       Docker containers use rsyslog to forward Apache/auth/vsftpd
       logs. Traffic is NAT-ed through the CTF host so Wazuh sees
       the host's 10.0.10.x address, NOT the 172.20.x bridge IP.
  -->
  <remote>
    <connection>syslog</connection>
    <port>514</port>
    <protocol>tcp</protocol>
    <allowed-ips>10.0.10.0/24</allowed-ips>
    <local_ip>0.0.0.0</local_ip>
  </remote>

  <!-- ── Syslog receiver: UDP fallback ──────────────────────── -->
  <remote>
    <connection>syslog</connection>
    <port>514</port>
    <protocol>udp</protocol>
    <allowed-ips>10.0.10.0/24</allowed-ips>
    <local_ip>0.0.0.0</local_ip>
  </remote>

  <!-- ── Agent event receiver (Wazuh agents in SSH/FTP containers) -->
  <remote>
    <connection>secure</connection>
    <port>1514</port>
    <protocol>tcp</protocol>
    <queue_size>131072</queue_size>
  </remote>
