# ── Standalone / reverse-proxied apps ────────────────────────────────────────

# WebGoat (Java, port 8080) — note: serves under /WebGoat (capital W)
location /WebGoat {
    proxy_pass         http://127.0.0.1:8080/WebGoat;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_read_timeout 300s;
}

# DVNA (Node.js, port 9001)
location /dvna/ {
    proxy_pass         http://127.0.0.1:9001/dvna/;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_read_timeout 120s;
}

# OWASP Juice Shop (Node.js, port 3000) — runs at /, we strip the prefix
location /juice-shop/ {
    proxy_pass         http://127.0.0.1:3000/;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_read_timeout 120s;
}

# WrongSecrets (Java, port 8085)
location /wrongsecrets/ {
