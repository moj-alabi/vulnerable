# ── PHP apps (files live in /var/www/html/<app>) ─────────────────────────────

Alias /mutillidae /var/www/html/mutillidae
<Directory /var/www/html/mutillidae>
    Options FollowSymLinks
    AllowOverride All
    Require all granted
    DirectoryIndex index.php index.html
</Directory>

