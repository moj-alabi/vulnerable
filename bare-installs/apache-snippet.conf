# ── Standalone / reverse-proxied apps ────────────────────────────────────────

# WebGoat (Java, port 8080) — note: capital W in path
ProxyRequests Off
<Location /WebGoat>
    ProxyPass        http://127.0.0.1:8080/WebGoat
    ProxyPassReverse http://127.0.0.1:8080/WebGoat
    ProxyPreserveHost On
    Require all granted
</Location>

# DVNA (Node.js, port 9001) — app runs at /, strip the prefix
ProxyRequests Off
<Location /dvna/>
    ProxyPass        http://127.0.0.1:9001/
    ProxyPassReverse http://127.0.0.1:9001/
    ProxyPreserveHost On
    Require all granted
</Location>

